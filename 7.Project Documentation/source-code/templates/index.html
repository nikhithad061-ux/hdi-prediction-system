<!DOCTYPE html>
<html>
<head>
    <title>HDI Prediction App</title>
</head>
<body>

    <h2>Human Development Index Predictor</h2>

    <form action="/predict" method="post">
        <input type="text" name="life" placeholder="Life Expectancy" required><br><br>
        <input type="text" name="expected" placeholder="Expected Years of Schooling" required><br><br>
        <input type="text" name="mean" placeholder="Mean Years of Schooling" required><br><br>
        <input type="text" name="gni" placeholder="GNI per Capita" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
